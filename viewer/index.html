<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dawnlight</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
  canvas { display: block; position: fixed; top: 48px; left: 0; }

  #site-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    height: 48px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: #0e0e1a; border-bottom: 1px solid #2a2a3e;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .logo { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: .5px; }
  #zone-select {
    padding: 5px 10px; font-size: 13px; font-family: inherit;
    background: #1e1e34; color: #c8b88a; border: 1px solid #2a2a40;
    border-radius: 5px; cursor: pointer; outline: none;
    transition: all .15s;
  }
  #zone-select:hover { background: #252540; border-color: #4a4a6e; }
  #zone-select:focus { border-color: #d4a44a; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .tex-mode { display: flex; }
  .tex-mode button {
    padding: 9px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
    background: #1e1e34; color: #667; border: 1px solid #2a2a40;
    font-family: inherit; transition: all .2s ease;
    letter-spacing: .3px;
  }
  .tex-mode button:first-child { border-radius: 6px 0 0 6px; }
  .tex-mode button:last-child { border-radius: 0 6px 6px 0; border-left: 0; }
  .tex-mode button.active {
    background: linear-gradient(135deg, #2e2e52, #3a3a60);
    color: #f0e4bc; border-color: #5a5a7e;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 0 10px rgba(200,184,138,.12);
  }
  .tex-mode button:hover:not(.active) { background: #252540; color: #aab; }

  #btn-music {
    background: none; border: 1px solid #2a2a40; border-radius: 5px;
    color: #667; cursor: pointer; padding: 5px 8px; display: flex;
    align-items: center; transition: all .15s;
  }
  #btn-music:hover { color: #bbc; background: #1a1a30; }
  #btn-music.playing { color: #e8d8a8; border-color: #5a4a2e; }

  #btn-tex-up:not(.active) {
    background: linear-gradient(135deg, #1e1e34, #2a2a4e);
    color: #e8d8a8;
    border: 2px solid #d4a44a;
    box-shadow: 0 0 10px rgba(212,164,74,0.4), 0 0 3px rgba(232,200,100,0.2);
    position: relative;
    overflow: hidden;
  }
  #btn-tex-up:not(.active)::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg,
      transparent 20%, rgba(232,216,168,.15) 40%,
      rgba(232,216,168,.3) 50%, rgba(232,216,168,.15) 60%,
      transparent 80%);
    animation: shimmer 2.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { transform: translateX(-120%); }
    100% { transform: translateX(120%); }
  }

  #onboarding {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; border-radius: 10px;
    background: rgba(14, 14, 26, 0.8);
    border: 1px solid rgba(200, 184, 138, 0.12);
    color: #c8b88a; font-size: 13px; letter-spacing: .3px;
    backdrop-filter: blur(12px);
    animation: onboardIn 1s ease;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  #onboarding.hidden { opacity: 0; }
  #onboarding .sep { color: #3a3a4e; }
  @keyframes onboardIn {
    from { opacity: 0; transform: translateX(-50%) translateY(16px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  #tex-transition {
    position: fixed; inset: 0; z-index: 15;
    pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center,
      rgba(232,216,168,0.15) 0%,
      rgba(14,14,26,0.6) 100%);
    transition: opacity 0.3s ease;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  #tex-transition.active { opacity: 1; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(200,184,138,0.15);
    border-top-color: #d4a44a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .spinner-label {
    color: #c8b88a; font-size: 13px; font-weight: 500;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

</style>
</head>
<body>

<div id="site-header">
  <div class="header-left">
    <span class="logo">Dawnlight</span>
    <select id="zone-select" style="display:none">
      <option value="elwynn">Elwynn Forest</option>
      <option value="nagrand">Nagrand</option>
    </select>
  </div>
  <div class="header-right">
    <button id="btn-music" title="Toggle music (M)">
      <svg id="music-icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
      <svg id="music-icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/>
      </svg>
    </button>
    <div class="tex-mode">
      <button id="btn-tex-orig" class="active">Original</button>
      <button id="btn-tex-up">Upscaled</button>
    </div>
  </div>
</div>

<div id="onboarding">
  <span>WASD to move</span>
  <span class="sep">&middot;</span>
  <span>Drag to look around</span>
  <span class="sep">&middot;</span>
  <span>Scroll to zoom</span>
</div>

<div id="tex-transition">
  <div class="spinner"></div>
  <div class="spinner-label" id="spinner-label">Enhancing...</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.170.0",
    "three/addons/": "https://esm.sh/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module" src="src/app.js"></script>
</body>
</html>
