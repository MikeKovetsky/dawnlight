<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dawnlight - Elwynn Forest Viewer</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
  canvas { display: block; position: fixed; top: 48px; left: 0; }

  #site-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    height: 48px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: #0e0e1a; border-bottom: 1px solid #2a2a3e;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .logo { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: .5px; }
  .header-nav { display: flex; gap: 2px; }
  .header-nav a {
    padding: 6px 14px; border-radius: 5px; font-size: 13px;
    color: #778; text-decoration: none; transition: all .15s;
  }
  .header-nav a:hover { color: #bbc; background: #1a1a30; }
  .header-nav a.active { color: #e8d8a8; background: #1e1e34; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .mode-label { color: #667; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .tex-mode { display: flex; }
  .tex-mode button {
    padding: 6px 16px; font-size: 13px; cursor: pointer;
    background: #1e1e34; color: #778; border: 1px solid #2a2a40;
    font-family: inherit; transition: all .15s;
  }
  .tex-mode button:first-child { border-radius: 5px 0 0 5px; }
  .tex-mode button:last-child { border-radius: 0 5px 5px 0; border-left: 0; }
  .tex-mode button.active { background: #2a2a4e; color: #e8d8a8; border-color: #4a4a6e; }
  .tex-mode button:hover:not(.active) { background: #252540; color: #aab; }

  #btn-music {
    background: none; border: 1px solid #2a2a40; border-radius: 5px;
    color: #667; cursor: pointer; padding: 5px 8px; display: flex;
    align-items: center; transition: all .15s;
  }
  #btn-music:hover { color: #bbc; background: #1a1a30; }
  #btn-music.playing { color: #e8d8a8; border-color: #5a4a2e; }

  #btn-tex-up:not(.active) {
    background: linear-gradient(135deg, #1e1e34, #2a2a4e);
    color: #e8d8a8;
    border: 2px solid #d4a44a;
    box-shadow: 0 0 8px rgba(212,164,74,0.35), 0 0 2px rgba(232,200,100,0.2);
    position: relative;
    overflow: hidden;
  }
  #btn-tex-up:not(.active)::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg,
      transparent 20%, rgba(232,216,168,.15) 40%,
      rgba(232,216,168,.3) 50%, rgba(232,216,168,.15) 60%,
      transparent 80%);
    animation: shimmer 2.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { transform: translateX(-120%); }
    100% { transform: translateX(120%); }
  }

  #hud {
    position: fixed; top: 64px; left: 20px;
    color: #c8b88a; font-size: 13px; pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
    line-height: 1.8;
  }
  #hud h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; letter-spacing: .5px; }
  #hud .label { color: #9a9aaa; }
  #hud .value { color: #e8d8a8; font-weight: 500; }

  #drop-zone {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    background: rgba(26, 26, 46, .85);
    z-index: 100;
  }
  #drop-zone.active { display: flex; }
  #drop-zone .label {
    color: #c8b88a; font-size: 22px; font-weight: 600;
    border: 2px dashed #c8b88a; border-radius: 16px;
    padding: 60px 80px; pointer-events: none;
  }

  #controls-hint {
    position: fixed; bottom: 20px; left: 20px;
    color: #7a7a8a; font-size: 12px;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,.6);
    line-height: 1.7;
  }

  #tex-transition {
    position: fixed; inset: 0; z-index: 15;
    pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center,
      rgba(232,216,168,0.15) 0%,
      rgba(14,14,26,0.6) 100%);
    transition: opacity 0.3s ease;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  #tex-transition.active { opacity: 1; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(200,184,138,0.15);
    border-top-color: #d4a44a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .spinner-label {
    color: #c8b88a; font-size: 13px; font-weight: 500;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  #cam-coords {
    position: fixed; bottom: 20px; right: 20px; z-index: 10;
    color: rgba(200,184,138,0.7); font-size: 11px;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
    white-space: pre; line-height: 1.6;
  }
</style>
</head>
<body>

<div id="site-header">
  <div class="header-left">
    <span class="logo">Dawnlight</span>
    <nav class="header-nav">
      <a href="/" class="active">Viewer</a>
      <a href="/preview.html">Models</a>
      <a href="/textures/">Textures</a>
    </nav>
  </div>
  <div class="header-right">
    <button id="btn-music" title="Toggle music (M)">
      <svg id="music-icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
      <svg id="music-icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/>
      </svg>
    </button>
    <span class="mode-label">Mode:</span>
    <div class="tex-mode">
      <button id="btn-tex-orig" class="active">Original</button>
      <button id="btn-tex-up">Upscaled</button>
    </div>
  </div>
</div>

<div id="hud">
  <h1>Dawnlight</h1>
  <div><span class="label">Camera: </span><span class="value" id="mode-label">Orbit</span></div>
  <div><span class="label">Textures: </span><span class="value" id="tex-label">Original</span></div>
</div>

<div id="drop-zone"><div class="label">Drop files here</div></div>

<div id="controls-hint">
  F &mdash; toggle fly / orbit camera &bull; T &mdash; toggle textures &bull; M &mdash; toggle music<br>
  WASD &mdash; move (fly mode) &bull; Shift &mdash; fast<br>
  Space / C &mdash; up / down &bull; Drag &mdash; orbit
</div>

<div id="tex-transition">
  <div class="spinner"></div>
  <div class="spinner-label" id="spinner-label">Enhancing...</div>
</div>
<div id="cam-coords"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.170.0",
    "three/addons/": "https://esm.sh/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module" src="src/app.js"></script>
</body>
</html>
